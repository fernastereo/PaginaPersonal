name: 🔍 Continuous Integration

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    name: 🧪 Test & Validate
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📋 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🧪 Run tests
        run: npm run test

      - name: 🏗️ Test build (without secrets)
        run: |
          export VITE_EMAILJS_SERVICE_ID="test_service"
          export VITE_EMAILJS_TEMPLATE_ID="test_template" 
          export VITE_EMAILJS_PUBLIC_KEY="test_key"
          export VITE_APP_FIREBASE_API_KEY="test_api_key"
          export VITE_APP_FIREBASE_AUTH_DOMAIN="test_auth_domain"
          export VITE_APP_FIREBASE_PROJECT_ID="test_project_id"
          export VITE_APP_FIREBASE_STORAGE_BUCKET="test_storage_bucket"
          export VITE_APP_FIREBASE_MESSAGING_SENDER_ID="test_messaging_sender_id"
          export VITE_APP_FIREBASE_APP_ID="test_app_id"
          export VITE_APP_MEASUREMENT_ID="test_measurement_id"
          export VITE_AWS_ACCESS_KEY_ID="test_aws_access_key_id"
          export VITE_AWS_SECRET_ACCESS_KEY="test_aws_secret_access_key"
          export VITE_AWS_BUCKET="test_aws_bucket"
          export VITE_AWS_BUCKET_FOLDER="test_aws_bucket_folder"
          export VITE_AWS_REGION="test_aws_region"
          export VITE_AWS_PATH="test_aws_path"
          export VITE_BREVO_API_KEY="test_brevo_api_key"
          export VITE_ADMIN_EMAIL="test@admin.email"
          export VITE_ADMIN_EMAIL_FROM="test@admin.email"
          export VITE_ADMIN_NAME="Test Admin"
          export VITE_APP_NAME="Test App"
          npm run build

      - name: 📊 Build size analysis
        run: |
          echo "📦 Build completed successfully!"
          echo "📁 Build size:"
          du -sh dist/
          echo "📄 Main files:"
          ls -lah dist/assets/ || echo "No assets directory found"

  security:
    runs-on: ubuntu-latest
    name: 🔒 Security Scan
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 🔍 Run security audit
        run: npm audit --audit-level=high

      - name: 📋 Check for outdated packages
        run: npm outdated || true
